name: CI

on:
  push:
  pull_request:

# Supersede stale runs on a ref — but never cancel the post-merge run on main; for a
# repo without branch protection it may be the only gate that commit ever gets.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  ci:
    # Shared Foundry + Slither gate — definition lives in nocaeth/.github.
    # slither-filter-paths overridden: deps live at contracts/lib/ (this repo's Foundry
    # project is nested under contracts/, see root foundry.toml), not the default lib/.
    uses: nocaeth/.github/.github/workflows/ci-solidity.yml@v1
    with:
      slither-filter-paths: "contracts/lib/"
